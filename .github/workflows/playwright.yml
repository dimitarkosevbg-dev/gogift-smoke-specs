name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The official Playwright Docker image ships pre-installed Node.js,
# Chromium, Firefox, WebKit, and all system libraries. Pin the version
# here once — when you bump @playwright/test in package.json, update
# this tag to match (e.g. v1.60.0-noble). All three jobs share it for
# environment consistency.
env:
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.59.1-noble

jobs:
  quality-check:
    name: Quality gate (lint, format, typecheck)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # GitHub-hosted runners use UID 1001 for the workspace owner.
      # Match it so files written by `npm ci` aren't owned by root.
      options: --user 1001
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run typecheck

  test:
    name: ${{ matrix.project }} (shard ${{ matrix.shard }}/2)
    needs: quality-check
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - 'Mobile Chrome'
          - 'Mobile Safari'
          - Tablet
          - webkit
        shard: [1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --project="${{ matrix.project }}" --shard=${{ matrix.shard }}/2 --grep @regression
        env:
          CI: true

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project }}-${{ matrix.shard }}
          path: blob-report
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Merge HTML reports
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload consolidated HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30
